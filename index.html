<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Body Measurement</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<style>
body{
  margin:0;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  font-family:'Segoe UI',sans-serif;
  color:white;
  text-align:center;
}

.container{
  padding:20px;
}

.card{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(10px);
  border-radius:20px;
  padding:20px;
  box-shadow:0 8px 30px rgba(0,0,0,0.4);
  max-width:900px;
  margin:auto;
}

canvas{
  width:100%;
  max-width:500px;
  border-radius:15px;
  margin-top:15px;
}

select,button{
  padding:10px 15px;
  margin:8px;
  border-radius:10px;
  border:none;
  font-size:14px;
}

button{
  background:#00c9ff;
  color:black;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  opacity:0.8;
}

#guideMessage{
  font-size:18px;
  margin-top:10px;
  font-weight:bold;
  color:#ffeb3b;
}

#countdown{
  font-size:70px;
  color:#ff5252;
}

@media(max-width:600px){
  canvas{
    max-width:95%;
  }
}
</style>
</head>
<body>

<div class="container">
<div class="card">

<h2>📏 Smart Auto Body Measurement</h2>

<select id="cameraSelect"></select>
<button onclick="startCamera()">카메라 시작</button>

<br>

<canvas id="canvas" width="480" height="720"></canvas>

<div id="guideMessage"></div>
<div id="countdown"></div>
<div id="result"></div>

</div>
</div>

<script>
const video=document.createElement("video");
video.autoplay=true;
video.playsInline=true;

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
const cameraSelect=document.getElementById("cameraSelect");

let stream;
let pose;
let countdownStart=null;
let captured=false;

async function initCameraList(){
  await navigator.mediaDevices.getUserMedia({video:true});
  const devices=await navigator.mediaDevices.enumerateDevices();
  const cams=devices.filter(d=>d.kind==="videoinput");

  cameraSelect.innerHTML="";
  cams.forEach((cam,i)=>{
    const option=document.createElement("option");
    option.value=cam.deviceId;
    option.text=cam.label||`Camera ${i+1}`;
    cameraSelect.appendChild(option);
  });

  startCamera();
}

async function startCamera(){
  if(stream) stream.getTracks().forEach(t=>t.stop());

  stream=await navigator.mediaDevices.getUserMedia({
    video:{deviceId:cameraSelect.value?{exact:cameraSelect.value}:undefined}
  });

  video.srcObject=stream;
}

cameraSelect.addEventListener("change",startCamera);

pose=new Pose({
  locateFile:(file)=>`https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
});

pose.setOptions({
  modelComplexity:1,
  smoothLandmarks:true,
  minDetectionConfidence:0.5,
  minTrackingConfidence:0.5
});

pose.onResults(results=>{
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(video,0,0,canvas.width,canvas.height);

  ctx.strokeStyle="#00e5ff";
  ctx.lineWidth=3;
  ctx.strokeRect(
    canvas.width*0.25,
    canvas.height*0.05,
    canvas.width*0.5,
    canvas.height*0.9
  );

  if(results.poseLandmarks){
    drawConnectors(ctx,results.poseLandmarks,POSE_CONNECTIONS);
    drawLandmarks(ctx,results.poseLandmarks);

    const headY=results.poseLandmarks[0].y;
    const ankleY=(results.poseLandmarks[27].y+
                  results.poseLandmarks[28].y)/2;

    const bodyHeight=ankleY-headY;

    let message="";

    if(bodyHeight>0.9){
      message="⬅️ 카메라에서 조금 더 멀리 서주세요";
      countdownStart=null;
    }else if(bodyHeight<0.6){
      message="➡️ 카메라에 조금 더 가까이 와주세요";
      countdownStart=null;
    }else{
      message="👍 자세 유지! 측정 준비 중...";
      if(!countdownStart) countdownStart=Date.now();

      let remaining=3-Math.floor((Date.now()-countdownStart)/1000);
      document.getElementById("countdown").innerText=
        remaining>0?remaining:"";

      if(remaining<=0 && !captured){
        captured=true;
        message="✅ 측정 완료!";
      }
    }

    document.getElementById("guideMessage").innerText=message;
  }

  requestAnimationFrame(processFrame);
});

async function processFrame(){
  if(video.readyState>=2){
    await pose.send({image:video});
  }
}

video.addEventListener("loadeddata",processFrame);

window.onload=initCameraList;
</script>

</body>
</html>
